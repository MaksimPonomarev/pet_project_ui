name: run ui tests

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run:  docker build -t pet-tests .

      - name: Run tests
        run: docker run \
              -e BASE_URL=https://automationexercise.com \
              -e SLOW_MO=0 \
              -e "TEST_DATA.IMAGE_PNG_FILE=test_data/Screenshot_1.png" \
              pet-tests